  <h2>10秒で何回押せる？</h2>

  <button onclick="tap()">タップ</button>
  <p id="count">0</p>
  <p id="time">10</p>

  <script>
    let count = 0;
    let time = 10;

    function tap() {
      if (time > 0) {
        count++;
        document.getElementById("count").innerText = count;
      }
    }

    const timer = setInterval(() => {
      time--;
      document.getElementById("time").innerText = time;

      if (time === 0) {
        clearInterval(timer);
        alert("終了！記録: " + count);
      }
    }, 1000);
  </script>
